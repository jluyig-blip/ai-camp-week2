<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>불만족 상세 이력</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --c-bg:#fafafa;--c-surface:#fff;--c-surface-2:#f4f4f5;--c-surface-3:#e4e4e7;
  --c-border:#e4e4e7;--c-border-2:#d4d4d8;
  --c-text:#18181b;--c-text-2:#52525b;--c-text-3:#71717a;--c-text-4:#a1a1aa;
  --c-accent:#059669;--c-accent-h:#047857;--c-accent-bg:#d1fae5;
  --c-danger:#dc2626;--c-danger-bg:#fee2e2;
  --c-warn:#f59e0b;--c-warn-bg:#fef3c7;
  --sh-sm:0 1px 2px rgba(0,0,0,.04);--sh-md:0 2px 8px rgba(0,0,0,.08);
  --hdr-h:52px;
}
[data-theme="dark"]{
  --c-bg:#0a0a0b;--c-surface:#18181b;--c-surface-2:#27272a;--c-surface-3:#3f3f46;
  --c-border:#27272a;--c-border-2:#3f3f46;
  --c-text:#fafafa;--c-text-2:#d4d4d8;--c-text-3:#a1a1aa;--c-text-4:#71717a;
  --c-accent:#10b981;--c-accent-h:#34d399;--c-accent-bg:rgba(16,185,129,.15);
  --c-danger:#ef4444;--c-danger-bg:rgba(239,68,68,.12);
  --c-warn:#f59e0b;--c-warn-bg:rgba(245,158,11,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--c-bg);color:var(--c-text);font-family:'Pretendard Variable',Pretendard,-apple-system,sans-serif;font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;overflow:hidden}

.hdr{height:var(--hdr-h);padding:0 20px;border-bottom:1px solid var(--c-border);background:var(--c-surface);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.brand{font-size:14px;font-weight:700;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
.brand-dot{color:var(--c-danger)}
.brand-badge{font-size:10px;font-family:'JetBrains Mono',monospace;font-weight:700;padding:2px 8px;border-radius:5px;background:var(--c-danger-bg);color:var(--c-danger)}
.hdr-r{display:flex;align-items:center;gap:8px}
.stats-row{display:flex;gap:1px;border:1px solid var(--c-border);border-radius:8px;overflow:hidden;background:var(--c-border)}
.stat{padding:4px 14px;background:var(--c-surface);text-align:center}
.stat .n{font-size:16px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1.2}
.stat .l{font-size:9px;color:var(--c-text-3);text-transform:uppercase;letter-spacing:.06em}
.btn-icon{background:var(--c-surface);border:1px solid var(--c-border-2);color:var(--c-text-2);padding:6px 11px;border-radius:7px;font-size:11.5px;cursor:pointer;font-family:inherit;font-weight:600}
.btn-icon:hover{border-color:var(--c-text-3);color:var(--c-text)}

/* Layout */
.main{flex:1;display:flex;min-height:0;overflow:hidden}

/* List panel */
.list-panel{width:360px;flex-shrink:0;border-right:1px solid var(--c-border);display:flex;flex-direction:column;background:var(--c-bg)}
.filter-bar{padding:8px 14px;background:var(--c-surface);border-bottom:1px solid var(--c-border);display:flex;align-items:center;gap:5px;flex-shrink:0;overflow-x:auto}
.f-pill{background:var(--c-surface);border:1.5px solid var(--c-border);color:var(--c-text-2);padding:4px 10px;border-radius:9999px;font-size:11.5px;cursor:pointer;font-family:inherit;font-weight:600;white-space:nowrap;flex-shrink:0}
.f-pill:hover{border-color:var(--c-text-4)}
.f-pill.active{background:var(--c-danger);color:#fff;border-color:var(--c-danger)}
.complaint-list{flex:1;overflow-y:auto;padding:8px}
.complaint-list::-webkit-scrollbar{width:4px}
.complaint-list::-webkit-scrollbar-thumb{background:var(--c-surface-3);border-radius:9999px}
.citem{background:var(--c-surface);border:1px solid var(--c-border);border-left:3px solid var(--c-danger);border-radius:8px;padding:10px 12px;margin-bottom:7px;cursor:pointer;transition:all .12s;box-shadow:var(--sh-sm)}
.citem:hover{box-shadow:var(--sh-md);border-left-color:var(--c-danger)}
.citem.active{border-color:var(--c-danger);background:var(--c-danger-bg)}
.citem.resolved{border-left-color:var(--c-accent)}
.citem-top{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.c-id{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--c-text-4);font-weight:700}
.c-pri{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px}
.pri-critical{background:#fef2f2;color:#dc2626}
.pri-high{background:#fff7ed;color:#c2410c}
.pri-medium{background:#eff6ff;color:#1d4ed8}
[data-theme="dark"] .pri-critical{background:rgba(220,38,38,.18);color:#fca5a5}
[data-theme="dark"] .pri-high{background:rgba(194,65,12,.18);color:#fdba74}
[data-theme="dark"] .pri-medium{background:rgba(29,78,216,.18);color:#93c5fd}
.c-status{margin-left:auto;font-size:9.5px;font-weight:700;padding:1px 7px;border-radius:9999px}
.s-open{background:var(--c-danger-bg);color:var(--c-danger)}
.s-processing{background:var(--c-warn-bg);color:var(--c-warn)}
.s-resolved{background:var(--c-accent-bg);color:var(--c-accent)}
.s-escalated{background:#fdf4ff;color:#7e22ce}
[data-theme="dark"] .s-escalated{background:rgba(168,85,247,.15);color:#d8b4fe}
.citem-subject{font-size:12px;font-weight:500;color:var(--c-text);margin-bottom:4px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.citem-meta{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--c-text-4);font-family:'JetBrains Mono',monospace}

/* Detail panel */
.detail-panel{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.detail-empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--c-text-4)}
.detail-empty .big{font-size:40px}
.detail-scroll{flex:1;overflow-y:auto;padding:16px 20px}
.detail-scroll::-webkit-scrollbar{width:5px}
.detail-scroll::-webkit-scrollbar-thumb{background:var(--c-surface-3);border-radius:9999px}
.detail-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:12px}
.dh-left{display:flex;flex-direction:column;gap:4px}
.dh-id{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--c-text-4);font-weight:700}
.dh-subject{font-size:15px;font-weight:700;line-height:1.4;color:var(--c-text)}
.dh-meta{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--c-text-3)}
.dh-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.btn-resolve{background:var(--c-accent);color:#fff;border:none;padding:6px 14px;border-radius:7px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .12s}
.btn-resolve:hover{background:var(--c-accent-h)}
.btn-escalate{background:transparent;color:#7e22ce;border:1.5px solid #d8b4fe;padding:6px 14px;border-radius:7px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:inherit}
[data-theme="dark"] .btn-escalate{color:#d8b4fe;border-color:rgba(168,85,247,.4)}

/* Info grid */
.info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.info-box{background:var(--c-surface);border:1px solid var(--c-border);border-radius:8px;padding:8px 11px}
.info-box .k{font-size:9.5px;font-weight:800;color:var(--c-text-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.info-box .v{font-size:12px;font-weight:600;color:var(--c-text);font-family:'JetBrains Mono',monospace}

/* Thread */
.thread-title{font-size:11px;font-weight:800;color:var(--c-text-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.thread-title::after{content:'';flex:1;height:1px;background:var(--c-border)}
.msg-bubble{display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
.msg-role{font-size:10px;font-weight:700;color:var(--c-text-3);text-transform:uppercase;letter-spacing:.04em}
.msg-role.role-customer{color:var(--c-danger)}
.msg-role.role-ai{color:var(--c-accent)}
.msg-role.role-agent{color:#7e22ce}
[data-theme="dark"] .msg-role.role-agent{color:#d8b4fe}
.msg-text{background:var(--c-surface);border:1px solid var(--c-border);border-radius:8px;padding:9px 12px;font-size:12px;line-height:1.65;color:var(--c-text-2);white-space:pre-wrap;word-break:break-word}
.msg-time{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--c-text-4)}

/* Note input */
.note-bar{padding:10px 16px;border-top:1px solid var(--c-border);background:var(--c-surface);display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.note-bar textarea{flex:1;background:var(--c-bg);border:1.5px solid var(--c-border-2);border-radius:8px;padding:7px 10px;font-size:12px;color:var(--c-text);font-family:inherit;resize:none;height:36px;line-height:1.5}
.note-bar textarea:focus{outline:none;border-color:var(--c-accent)}
.note-bar textarea::placeholder{color:var(--c-text-4)}
.btn-note{background:var(--c-danger);color:#fff;border:none;padding:7px 14px;border-radius:7px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;line-height:1.5}
.btn-note:hover{background:#b91c1c}
#toast-stack{position:fixed;bottom:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px;pointer-events:none}
</style>
</head>
<body>
<div class="hdr">
  <div class="brand">
    <span>AI Camp<span class="brand-dot">·</span>불만족 이력</span>
    <span class="brand-badge">COMPLAINT</span>
  </div>
  <div class="hdr-r">
    <div class="stats-row">
      <div class="stat"><div class="n" style="color:var(--c-danger)" id="stat-open">0</div><div class="l">미처리</div></div>
      <div class="stat"><div class="n" style="color:var(--c-warn)" id="stat-proc">0</div><div class="l">처리중</div></div>
      <div class="stat"><div class="n" style="color:var(--c-accent)" id="stat-res">0</div><div class="l">해결</div></div>
      <div class="stat"><div class="n" style="color:#7e22ce" id="stat-esc">0</div><div class="l">에스컬</div></div>
    </div>
    <a class="btn-icon" href="dashboard.html">← 대시보드</a>
    <a class="btn-icon" href="kanban.html">📌 칸반</a>
    <button class="btn-icon" onclick="toggleTheme()">☾</button>
    <button class="btn-icon" onclick="resetData()">↻ 초기화</button>
  </div>
</div>

<div class="main">
  <!-- List -->
  <div class="list-panel">
    <div class="filter-bar">
      <button class="f-pill active" data-f="all" onclick="setFilter('all',this)">전체</button>
      <button class="f-pill" data-f="open" onclick="setFilter('open',this)">미처리</button>
      <button class="f-pill" data-f="processing" onclick="setFilter('processing',this)">처리중</button>
      <button class="f-pill" data-f="resolved" onclick="setFilter('resolved',this)">해결</button>
      <button class="f-pill" data-f="escalated" onclick="setFilter('escalated',this)">에스컬</button>
    </div>
    <div class="complaint-list" id="complaint-list"></div>
  </div>

  <!-- Detail -->
  <div class="detail-panel" id="detail-panel">
    <div class="detail-empty">
      <div class="big">📋</div>
      <div style="font-size:12px">왼쪽 목록에서 항목을 선택하세요</div>
    </div>
  </div>
</div>

<div id="toast-stack"></div>

<script>
const LS = 'complaint-detail-v1';
let currentFilter = 'all';
let selectedId = null;

const SAMPLE = [
  {id:'CMP-001',status:'open',priority:'critical',category:'불만접수',customer:'최유나',orderId:'ORD-23612',
   subject:'CS 직원 불친절 응대 민원',
   inquiry:'CS 직원이 너무 불친절하게 응대했어요. 앞으로 절대 이 쇼핑몰 안 씁니다. 정말 화가 납니다.',
   thread:[
     {role:'customer',text:'CS 직원이 너무 불친절하게 응대했어요. 앞으로 절대 이 쇼핑몰 안 씁니다.',ts:Date.now()-86400000*3},
     {role:'ai',text:'안녕하세요, 고객님. 불쾌한 경험을 하셨다니 진심으로 사과드립니다. 담당자에게 전달하겠습니다.',ts:Date.now()-86400000*3+300000},
     {role:'customer',text:'그냥 사과 말고 실질적인 조치가 필요합니다.',ts:Date.now()-86400000*3+1800000},
   ],
   ts:Date.now()-86400000*3},
  {id:'CMP-002',status:'processing',priority:'high',category:'교환/반품',customer:'이서연',orderId:'ORD-23901',
   subject:'오배송 후 교환 지연 불만',
   inquiry:'빨간색 주문했는데 파란색이 왔고, 교환 요청 후 4일이 지났는데 연락도 없어요.',
   thread:[
     {role:'customer',text:'빨간색 주문했는데 파란색이 왔어요. 교환해주세요.',ts:Date.now()-86400000*2},
     {role:'ai',text:'고객님, 죄송합니다. 즉시 교환 처리해 드리겠습니다. 회수 기사가 내일 방문 예정입니다.',ts:Date.now()-86400000*2+600000},
     {role:'customer',text:'4일이 지났는데 아직도 연락이 없어요. 어떻게 된 건가요?',ts:Date.now()-86400000},
     {role:'agent',text:'[담당자] 물류팀에 확인 중입니다. 오늘 오후 연락드리겠습니다.',ts:Date.now()-3600000*5},
   ],
   ts:Date.now()-86400000*2},
  {id:'CMP-003',status:'escalated',priority:'critical',category:'환불요청',customer:'김대호',orderId:'ORD-23500',
   subject:'결제 오류로 이중 청구 후 미환불',
   inquiry:'같은 주문으로 두 번 결제가 됐는데 환불 요청 후 2주가 지났는데 아직도 안 됩니다.',
   thread:[
     {role:'customer',text:'결제가 두 번 됐어요. 환불 요청합니다.',ts:Date.now()-86400000*14},
     {role:'ai',text:'이중 청구 확인되었습니다. 환불 처리해 드리겠습니다.',ts:Date.now()-86400000*14+600000},
     {role:'customer',text:'1주일이 지났는데 환불이 안 됩니다.',ts:Date.now()-86400000*7},
     {role:'agent',text:'[담당자] 결제팀에서 처리 중입니다.',ts:Date.now()-86400000*7+3600000},
     {role:'customer',text:'2주가 지났어요. 법적 조치를 취할 수 있습니다.',ts:Date.now()-86400000},
     {role:'agent',text:'[에스컬] 고객 불만 수위 상승 — 법무팀 검토 요청.',ts:Date.now()-3600000*12},
   ],
   ts:Date.now()-86400000*14},
  {id:'CMP-004',status:'resolved',priority:'high',category:'배송문의',customer:'박민수',orderId:'ORD-23780',
   subject:'파손 배송 상품 환불 처리 완료',
   inquiry:'배송 중 상품이 파손되어 받았습니다. 환불 요청합니다.',
   thread:[
     {role:'customer',text:'상품이 파손된 채로 도착했어요. 사진 찍어 놨습니다.',ts:Date.now()-86400000*5},
     {role:'ai',text:'고객님, 파손 배송 확인되었습니다. 즉시 전액 환불 처리해 드리겠습니다.',ts:Date.now()-86400000*5+300000},
     {role:'agent',text:'[담당자] 환불 처리 완료. 3~5일 내 입금 예정.',ts:Date.now()-86400000*4},
     {role:'customer',text:'환불 받았습니다. 감사합니다.',ts:Date.now()-86400000*2},
   ],
   ts:Date.now()-86400000*5},
  {id:'CMP-005',status:'open',priority:'medium',category:'상품문의',customer:'정민지',orderId:'ORD-24020',
   subject:'AI 답변 정보 오류 불만',
   inquiry:'AI가 사이즈 정보를 잘못 안내해서 맞지 않는 제품을 받았어요. 교환 부탁드립니다.',
   thread:[
     {role:'customer',text:'AI가 알려준 사이즈 대로 샀는데 맞지 않아요. AI 답변 오류 아닌가요?',ts:Date.now()-3600000*6},
     {role:'ai',text:'불편을 드려 죄송합니다. 사이즈 안내 내용을 확인하겠습니다.',ts:Date.now()-3600000*6+300000},
   ],
   ts:Date.now()-3600000*6},
];

function loadData(){ const s=localStorage.getItem(LS); return s?JSON.parse(s):SAMPLE.map(d=>({...d,thread:[...d.thread.map(t=>({...t}))]})); }
function saveData(d){ localStorage.setItem(LS,JSON.stringify(d)); }

const PRI_LBL={critical:'긴급',high:'높음',medium:'보통'};
const STATUS_LBL={open:'미처리',processing:'처리중',resolved:'해결',escalated:'에스컬'};
const STATUS_CLS={open:'s-open',processing:'s-processing',resolved:'s-resolved',escalated:'s-escalated'};
const ROLE_LBL={customer:'고객',ai:'AI 응답',agent:'담당자'};
function timeDiff(ts){ const m=Math.floor((Date.now()-ts)/60000); if(m<1) return '방금'; if(m<60) return m+'분 전'; const h=Math.floor(m/60); if(h<24) return h+'시간 전'; return Math.floor(h/24)+'일 전'; }
function fmtTime(ts){ return new Date(ts).toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}); }
function esc(t){ const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

function setFilter(f,el){
  currentFilter=f;
  document.querySelectorAll('.f-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function renderList(){
  const data=loadData();
  document.getElementById('stat-open').textContent=data.filter(d=>d.status==='open').length;
  document.getElementById('stat-proc').textContent=data.filter(d=>d.status==='processing').length;
  document.getElementById('stat-res').textContent=data.filter(d=>d.status==='resolved').length;
  document.getElementById('stat-esc').textContent=data.filter(d=>d.status==='escalated').length;

  const filtered=currentFilter==='all'?data:data.filter(d=>d.status===currentFilter);
  const el=document.getElementById('complaint-list');
  if(!filtered.length){ el.innerHTML='<div style="text-align:center;padding:30px 10px;color:var(--c-text-4);font-size:11px">해당 항목 없음</div>'; return; }
  el.innerHTML=filtered.map(d=>`
    <div class="citem ${d.status==='resolved'?'resolved':''} ${selectedId===d.id?'active':''}" onclick="selectItem('${d.id}')">
      <div class="citem-top">
        <span class="c-id">${esc(d.id)}</span>
        <span class="c-pri pri-${d.priority}">${PRI_LBL[d.priority]||d.priority}</span>
        <span class="c-status ${STATUS_CLS[d.status]||'s-open'}">${STATUS_LBL[d.status]||d.status}</span>
      </div>
      <div class="citem-subject">${esc(d.subject)}</div>
      <div class="citem-meta">
        <span>${esc(d.customer)}</span>·<span>${esc(d.orderId)}</span>·<span>${timeDiff(d.ts)}</span>·<span>메시지 ${d.thread.length}개</span>
      </div>
    </div>
  `).join('');
}

function selectItem(id){
  selectedId=id;
  renderList();
  renderDetail();
}

function renderDetail(){
  const data=loadData();
  const d=data.find(x=>x.id===selectedId);
  const panel=document.getElementById('detail-panel');
  if(!d){ panel.innerHTML='<div class="detail-empty"><div class="big">📋</div><div style="font-size:12px">항목을 선택하세요</div></div>'; return; }

  panel.innerHTML=`
    <div class="detail-scroll">
      <div class="detail-head">
        <div class="dh-left">
          <div class="dh-id">${esc(d.id)} · ${esc(d.category)}</div>
          <div class="dh-subject">${esc(d.subject)}</div>
          <div class="dh-meta">
            <span class="c-status ${STATUS_CLS[d.status]||'s-open'}">${STATUS_LBL[d.status]||d.status}</span>
            <span>고객: ${esc(d.customer)}</span>
            <span>${esc(d.orderId)}</span>
            <span>${timeDiff(d.ts)}</span>
          </div>
        </div>
        <div class="dh-right">
          ${d.status!=='resolved'?`<button class="btn-resolve" onclick="resolveItem('${d.id}')">✓ 해결 처리</button>`:''}
          ${d.status!=='escalated'&&d.status!=='resolved'?`<button class="btn-escalate" onclick="escalateItem('${d.id}')">↑ 에스컬레이션</button>`:''}
        </div>
      </div>
      <div class="info-grid">
        <div class="info-box"><div class="k">고객</div><div class="v">${esc(d.customer)}</div></div>
        <div class="info-box"><div class="k">주문번호</div><div class="v">${esc(d.orderId)}</div></div>
        <div class="info-box"><div class="k">메시지 수</div><div class="v">${d.thread.length}개</div></div>
      </div>
      <div class="thread-title">대화 이력</div>
      ${d.thread.map(m=>`
        <div class="msg-bubble">
          <div class="msg-role role-${m.role}">${ROLE_LBL[m.role]||m.role}</div>
          <div class="msg-text">${esc(m.text)}</div>
          <div class="msg-time">${fmtTime(m.ts)}</div>
        </div>
      `).join('')}
    </div>
    <div class="note-bar">
      <textarea id="note-input" placeholder="담당자 메모 추가..." onkeydown="noteKey(event,'${d.id}')"></textarea>
      <button class="btn-note" onclick="addNote('${d.id}')">메모 추가</button>
    </div>
  `;
}

function addNote(id){
  const ta=document.getElementById('note-input'); const text=(ta.value||'').trim(); if(!text) return;
  const data=loadData(); const d=data.find(x=>x.id===id); if(!d) return;
  d.thread.push({role:'agent',text:'[담당자] '+text,ts:Date.now()});
  if(d.status==='open') d.status='processing';
  saveData(data); ta.value=''; renderList(); renderDetail(); showToast('메모 추가됨','ok');
}
function noteKey(e,id){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); addNote(id); } }
function resolveItem(id){
  const data=loadData(); const d=data.find(x=>x.id===id); if(!d) return;
  d.status='resolved'; d.thread.push({role:'agent',text:'[시스템] 해결 처리 완료.',ts:Date.now()});
  saveData(data); renderList(); renderDetail(); showToast(`${id} 해결 처리`,'ok');
}
function escalateItem(id){
  const data=loadData(); const d=data.find(x=>x.id===id); if(!d) return;
  d.status='escalated'; d.thread.push({role:'agent',text:'[에스컬] 상위 담당자 에스컬레이션 처리.',ts:Date.now()});
  saveData(data); renderList(); renderDetail(); showToast(`${id} 에스컬레이션`,'err');
}
function resetData(){ localStorage.removeItem(LS); selectedId=null; renderList(); renderDetail(); showToast('초기화 완료','ok'); }
function toggleTheme(){ const r=document.documentElement; r.dataset.theme=r.dataset.theme==='dark'?'':'dark'; }
function showToast(msg,type){
  let c=document.getElementById('toast-stack');
  const t=document.createElement('div'); t.textContent=msg;
  t.style.cssText=`padding:9px 14px;border-radius:8px;font-size:12px;font-weight:600;color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.2);max-width:280px;pointer-events:auto;background:${type==='ok'?'#059669':'#dc2626'}`;
  c.appendChild(t); setTimeout(()=>{ t.style.transition='opacity .3s'; t.style.opacity='0'; setTimeout(()=>t.remove(),300); },2500);
}
renderList();
renderDetail();
</script>
</body>
</html>
