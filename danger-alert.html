<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>위험 케이스 알림</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --c-bg:#fafafa;--c-surface:#fff;--c-surface-2:#f4f4f5;--c-surface-3:#e4e4e7;
  --c-border:#e4e4e7;--c-border-2:#d4d4d8;
  --c-text:#18181b;--c-text-2:#52525b;--c-text-3:#71717a;--c-text-4:#a1a1aa;
  --c-accent:#059669;--c-accent-h:#047857;--c-accent-bg:#d1fae5;
  --c-danger:#dc2626;--c-danger-h:#b91c1c;--c-danger-bg:#fee2e2;
  --c-warn:#f59e0b;--c-warn-bg:#fef3c7;
  --c-purple:#7c3aed;--c-purple-bg:#ede9fe;
  --sh-sm:0 1px 2px rgba(0,0,0,.05);--sh-md:0 4px 16px rgba(0,0,0,.1);--sh-lg:0 8px 32px rgba(0,0,0,.15);
  --hdr-h:52px;
}
[data-theme="dark"]{
  --c-bg:#0a0a0b;--c-surface:#18181b;--c-surface-2:#27272a;--c-surface-3:#3f3f46;
  --c-border:#27272a;--c-border-2:#3f3f46;
  --c-text:#fafafa;--c-text-2:#d4d4d8;--c-text-3:#a1a1aa;--c-text-4:#71717a;
  --c-accent:#10b981;--c-accent-h:#34d399;--c-accent-bg:rgba(16,185,129,.15);
  --c-danger:#ef4444;--c-danger-h:#dc2626;--c-danger-bg:rgba(239,68,68,.15);
  --c-warn:#f59e0b;--c-warn-bg:rgba(245,158,11,.15);
  --c-purple:#a78bfa;--c-purple-bg:rgba(124,58,237,.15);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--c-bg);color:var(--c-text);font-family:'Pretendard Variable',Pretendard,-apple-system,sans-serif;font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;overflow:hidden}

/* Header */
.hdr{height:var(--hdr-h);padding:0 20px;border-bottom:1px solid var(--c-border);background:var(--c-surface);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.brand{font-size:14px;font-weight:700;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
.brand-dot{color:var(--c-danger)}
.brand-badge{font-size:10px;font-family:'JetBrains Mono',monospace;font-weight:700;padding:2px 8px;border-radius:5px;background:var(--c-danger-bg);color:var(--c-danger);display:flex;align-items:center;gap:5px}
.badge-pulse{width:6px;height:6px;border-radius:50%;background:var(--c-danger);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.hdr-r{display:flex;align-items:center;gap:8px}
.stats-row{display:flex;gap:1px;border:1px solid var(--c-border);border-radius:8px;overflow:hidden;background:var(--c-border)}
.stat{padding:4px 14px;background:var(--c-surface);text-align:center}
.stat .n{font-size:16px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1.2}
.stat .l{font-size:9px;color:var(--c-text-3);text-transform:uppercase;letter-spacing:.06em}
.btn-icon{background:var(--c-surface);border:1px solid var(--c-border-2);color:var(--c-text-2);padding:6px 11px;border-radius:7px;font-size:11.5px;cursor:pointer;font-family:inherit;font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.btn-icon:hover{border-color:var(--c-text-3);color:var(--c-text)}

/* Filter bar */
.filter-bar{padding:8px 20px;background:var(--c-surface);border-bottom:1px solid var(--c-border);display:flex;align-items:center;gap:6px;flex-shrink:0}
.f-pill{background:var(--c-surface);border:1.5px solid var(--c-border);color:var(--c-text-2);padding:5px 12px;border-radius:9999px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.f-pill:hover{border-color:var(--c-text-4)}
.f-pill.active{background:var(--c-danger);color:#fff;border-color:var(--c-danger)}
.f-cnt{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:0 5px;border-radius:9999px}
.f-pill.active .f-cnt{background:rgba(255,255,255,.25);color:#fff}
.f-pill:not(.active) .f-cnt{background:var(--c-surface-3);color:var(--c-text-3)}
.f-search{margin-left:auto;background:var(--c-bg);border:1.5px solid var(--c-border-2);border-radius:7px;padding:5px 10px;font-size:12px;color:var(--c-text);font-family:inherit;width:200px}
.f-search:focus{outline:none;border-color:var(--c-danger)}
.f-search::placeholder{color:var(--c-text-4)}

/* Main layout */
.main{flex:1;display:flex;min-height:0;overflow:hidden}
.alert-list-wrap{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:12px}
.alert-list-wrap::-webkit-scrollbar{width:5px}
.alert-list-wrap::-webkit-scrollbar-thumb{background:var(--c-surface-3);border-radius:9999px}

/* Alert card */
.acard{background:var(--c-surface);border:1px solid var(--c-border);border-radius:12px;overflow:hidden;box-shadow:var(--sh-sm);transition:box-shadow .15s,transform .15s;cursor:pointer}
.acard:hover{box-shadow:var(--sh-md);transform:translateY(-1px)}
.acard.sev-critical{border-left:4px solid var(--c-danger)}
.acard.sev-high{border-left:4px solid var(--c-warn)}
.acard.sev-medium{border-left:4px solid #8b5cf6}
.acard.resolved{opacity:.65}
.acard.resolved .acard-score-ring circle.ring-fg{stroke:var(--c-accent)!important}

/* Card header */
.acard-head{padding:10px 14px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--c-border);background:var(--c-surface-2)}
.sev-badge{font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:800;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0}
.sev-critical{background:var(--c-danger-bg);color:var(--c-danger)}
.sev-high{background:var(--c-warn-bg);color:var(--c-warn)}
.sev-medium{background:#ede9fe;color:#7c3aed}
[data-theme="dark"] .sev-medium{background:rgba(124,58,237,.15);color:#a78bfa}
.alert-type-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;background:var(--c-surface-3);color:var(--c-text-2);flex-shrink:0}
.a-id{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--c-text-4);font-weight:700}
.a-time{margin-left:auto;font-size:10px;color:var(--c-text-4);font-family:'JetBrains Mono',monospace}
.a-status{font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:9999px;flex-shrink:0}
.s-active{background:var(--c-danger-bg);color:var(--c-danger)}
.s-assigned{background:var(--c-warn-bg);color:var(--c-warn)}
.s-resolved{background:var(--c-accent-bg);color:var(--c-accent)}

/* Card body — score ring + content */
.acard-body{padding:14px;display:flex;gap:14px;align-items:flex-start}
.score-ring-wrap{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px}
.acard-score-ring{width:64px;height:64px}
.ring-bg{fill:none;stroke:var(--c-surface-3);stroke-width:6}
.ring-fg{fill:none;stroke-width:6;stroke-linecap:round;transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset .5s ease}
.ring-label{font-family:'JetBrains Mono',monospace;font-weight:800;fill:var(--c-text);font-size:13px;dominant-baseline:middle;text-anchor:middle}
.ring-sub{font-size:9px;color:var(--c-text-4);font-weight:700;text-transform:uppercase;letter-spacing:.04em;text-align:center}

.acard-content{flex:1;min-width:0}
.a-trigger{font-size:13px;font-weight:700;color:var(--c-text);margin-bottom:8px;display:flex;align-items:flex-start;gap:6px;line-height:1.4}
.a-trigger .icon{font-size:15px;flex-shrink:0;margin-top:1px}

/* Keyword tags */
.keyword-section{margin-bottom:8px}
.keyword-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--c-text-4);margin-bottom:5px}
.kw-tags{display:flex;flex-wrap:wrap;gap:4px}
.kw-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;background:var(--c-danger-bg);color:var(--c-danger);font-family:'JetBrains Mono',monospace;border:1px solid rgba(220,38,38,.2)}
.kw-tag.kw-warn{background:var(--c-warn-bg);color:#92400e;border-color:rgba(245,158,11,.25)}
.kw-tag.kw-purple{background:var(--c-purple-bg);color:var(--c-purple);border-color:rgba(124,58,237,.2)}
.kw-tag.kw-neutral{background:var(--c-surface-2);color:var(--c-text-3);border-color:var(--c-border)}

.a-meta-row{display:flex;gap:12px;flex-wrap:wrap}
.a-meta-item{font-size:10.5px;color:var(--c-text-3);display:flex;gap:4px;align-items:center}
.a-meta-item .lbl{font-weight:800;text-transform:uppercase;font-size:9px;letter-spacing:.04em}
.a-meta-item .val{font-family:'JetBrains Mono',monospace;color:var(--c-text-2);font-weight:600}

/* Card footer */
.acard-foot{padding:9px 14px;border-top:1px solid var(--c-border);background:var(--c-surface-2);display:flex;align-items:center;justify-content:space-between}
.foot-hint{font-size:10.5px;color:var(--c-text-4);display:flex;align-items:center;gap:4px}
.action-btns{display:flex;gap:6px}
.btn-assign{background:var(--c-warn);color:#fff;border:none;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-assign:hover{background:#d97706}
.btn-escalate{background:var(--c-purple);color:#fff;border:none;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-escalate:hover{background:#6d28d9}
.btn-resolve{background:var(--c-accent);color:#fff;border:none;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-resolve:hover{background:var(--c-accent-h)}
.resolved-lbl{font-size:11px;color:var(--c-accent);font-weight:700}

/* Timeline sidebar */
.timeline{width:270px;flex-shrink:0;border-left:1px solid var(--c-border);background:var(--c-surface);display:flex;flex-direction:column;overflow:hidden}
.tl-head{padding:10px 14px;border-bottom:1px solid var(--c-border);background:var(--c-surface-2);flex-shrink:0}
.tl-head .ttl{font-size:11px;font-weight:700}
.tl-scroll{flex:1;overflow-y:auto;padding:10px 14px}
.tl-scroll::-webkit-scrollbar{width:4px}
.tl-scroll::-webkit-scrollbar-thumb{background:var(--c-surface-3);border-radius:9999px}
.tl-item{padding:8px 0;border-bottom:1px solid var(--c-border);display:flex;gap:8px;align-items:flex-start;cursor:pointer}
.tl-item:hover .tl-body .t{color:var(--c-danger)}
.tl-item:last-child{border-bottom:0}
.tl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.tl-body .t{font-size:11.5px;font-weight:500;color:var(--c-text);line-height:1.4;transition:color .1s}
.tl-body .m{font-size:10px;color:var(--c-text-4);font-family:'JetBrains Mono',monospace;margin-top:2px}

/* Detail modal */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:20px}
.modal-overlay.hidden{display:none}
.modal-box{background:var(--c-surface);border:1px solid var(--c-border);border-radius:16px;width:100%;max-width:660px;max-height:92vh;display:flex;flex-direction:column;box-shadow:var(--sh-lg);overflow:hidden}
.modal-head{padding:14px 18px;border-bottom:1px solid var(--c-border);background:var(--c-surface-2);display:flex;align-items:center;gap:8px;flex-shrink:0}
.modal-id{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--c-text-4);font-weight:700}
.modal-title{font-size:14px;font-weight:700;flex:1}
.modal-close{background:var(--c-surface-3);border:none;width:28px;height:28px;border-radius:7px;font-size:14px;cursor:pointer;color:var(--c-text-2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit}
.modal-close:hover{background:var(--c-danger-bg);color:var(--c-danger)}

.modal-body{flex:1;overflow-y:auto;padding:0}
.modal-body::-webkit-scrollbar{width:5px}
.modal-body::-webkit-scrollbar-thumb{background:var(--c-surface-3);border-radius:9999px}

/* Modal score banner */
.modal-score-banner{padding:16px 20px;display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--c-border);background:var(--c-surface-2)}
.modal-score-ring{width:72px;height:72px;flex-shrink:0}
.modal-score-info{flex:1}
.modal-score-num{font-size:28px;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1}
.modal-score-desc{font-size:11px;color:var(--c-text-3);margin-top:3px;font-weight:600}
.modal-score-bar{margin-top:8px;height:6px;background:var(--c-surface-3);border-radius:9999px;overflow:hidden}
.modal-score-bar-fill{height:100%;border-radius:9999px;transition:width .5s ease}

.modal-section{padding:16px 20px;border-bottom:1px solid var(--c-border)}
.modal-section:last-child{border-bottom:0}
.modal-label{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--c-text-4);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.modal-value{font-size:13px;color:var(--c-text);line-height:1.6;font-weight:600}
.modal-detail-box{background:var(--c-bg);border:1px solid var(--c-border);border-radius:8px;padding:12px 14px;font-size:12px;color:var(--c-text-2);line-height:1.7;white-space:pre-wrap;word-break:break-word}

/* AI 권장조치 */
.ai-actions-list{display:flex;flex-direction:column;gap:7px}
.ai-action-item{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;background:var(--c-surface-2);border-radius:8px;border:1px solid var(--c-border)}
.ai-action-num{width:20px;height:20px;border-radius:50%;background:var(--c-accent);color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-family:'JetBrains Mono',monospace}
.ai-action-text{font-size:12px;color:var(--c-text-2);line-height:1.5;flex:1}

/* 후속조치 버튼 */
.followup-btns{display:flex;flex-wrap:wrap;gap:7px}
.btn-followup{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;border:1.5px solid transparent;transition:all .1s}
.btn-followup.primary{background:var(--c-danger);color:#fff;border-color:var(--c-danger)}
.btn-followup.primary:hover{background:var(--c-danger-h)}
.btn-followup.warn{background:var(--c-warn);color:#fff;border-color:var(--c-warn)}
.btn-followup.warn:hover{background:#d97706}
.btn-followup.purple{background:var(--c-purple);color:#fff;border-color:var(--c-purple)}
.btn-followup.purple:hover{background:#6d28d9}
.btn-followup.ghost{background:transparent;color:var(--c-text-2);border-color:var(--c-border-2)}
.btn-followup.ghost:hover{border-color:var(--c-text-3);color:var(--c-text)}
.btn-followup.success{background:var(--c-accent);color:#fff;border-color:var(--c-accent)}
.btn-followup.success:hover{background:var(--c-accent-h)}

.modal-meta-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.modal-meta-card{background:var(--c-surface-2);border:1px solid var(--c-border);border-radius:8px;padding:9px 11px}
.modal-meta-card .lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--c-text-4);margin-bottom:3px}
.modal-meta-card .val{font-size:12px;font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--c-text)}

#toast-stack{position:fixed;bottom:20px;right:20px;z-index:400;display:flex;flex-direction:column;gap:8px;pointer-events:none}
</style>
</head>
<body>
<div class="hdr">
  <div class="brand">
    <span>AI Camp<span class="brand-dot">·</span>위험 케이스</span>
    <span class="brand-badge"><span class="badge-pulse"></span>LIVE</span>
  </div>
  <div class="hdr-r">
    <div class="stats-row">
      <div class="stat"><div class="n" style="color:var(--c-danger)" id="st-active">0</div><div class="l">활성</div></div>
      <div class="stat"><div class="n" style="color:var(--c-warn)" id="st-assigned">0</div><div class="l">담당배정</div></div>
      <div class="stat"><div class="n" style="color:var(--c-accent)" id="st-resolved">0</div><div class="l">해결</div></div>
    </div>
    <a href="dashboard.html" class="btn-icon">← 대시보드</a>
    <a href="kanban.html" class="btn-icon">📌 칸반</a>
    <button class="btn-icon" onclick="addMockAlert()">+ 테스트 알림</button>
    <button class="btn-icon" onclick="toggleTheme()">☾</button>
  </div>
</div>

<div class="filter-bar">
  <button class="f-pill active" data-f="all" onclick="setFilter('all',this)">전체 <span class="f-cnt" id="cnt-all">0</span></button>
  <button class="f-pill" data-f="active" onclick="setFilter('active',this)">활성 <span class="f-cnt" id="cnt-active">0</span></button>
  <button class="f-pill" data-f="assigned" onclick="setFilter('assigned',this)">담당배정 <span class="f-cnt" id="cnt-assigned">0</span></button>
  <button class="f-pill" data-f="resolved" onclick="setFilter('resolved',this)">해결 <span class="f-cnt" id="cnt-resolved">0</span></button>
  <input class="f-search" type="text" id="search-input" placeholder="고객명·주문번호·키워드 검색..." oninput="renderAll()">
</div>

<div class="main">
  <div class="alert-list-wrap" id="alert-list"></div>
  <div class="timeline">
    <div class="tl-head"><div class="ttl">📡 탐지 타임라인</div></div>
    <div class="tl-scroll" id="tl-list"></div>
  </div>
</div>

<div id="toast-stack"></div>

<!-- Detail modal -->
<div class="modal-overlay hidden" id="detail-modal" onclick="closeDetail(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-head">
      <span id="modal-sev-badge" class="sev-badge"></span>
      <span class="modal-id" id="modal-id"></span>
      <span class="modal-title" id="modal-title"></span>
      <button class="modal-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="modal-body">
      <!-- 위험점수 링 배너 -->
      <div class="modal-score-banner">
        <svg class="modal-score-ring" viewBox="0 0 80 80">
          <circle class="ring-bg" cx="40" cy="40" r="32"/>
          <circle class="ring-fg" id="modal-ring-fg" cx="40" cy="40" r="32" stroke-dasharray="201.1" stroke-dashoffset="201.1"/>
          <text class="ring-label" id="modal-ring-text" x="40" y="41">0</text>
        </svg>
        <div class="modal-score-info">
          <div class="modal-score-num" id="modal-score-num" style="color:var(--c-danger)">0<span style="font-size:14px;color:var(--c-text-3)">/100</span></div>
          <div class="modal-score-desc" id="modal-score-desc">위험 점수</div>
          <div class="modal-score-bar"><div class="modal-score-bar-fill" id="modal-score-bar-fill" style="width:0%;background:var(--c-danger)"></div></div>
        </div>
        <div id="modal-status-badge" class="a-status" style="align-self:flex-start;font-size:11px;padding:4px 10px"></div>
      </div>

      <!-- 트리거 -->
      <div class="modal-section">
        <div class="modal-label">⚡ 트리거 조건</div>
        <div class="modal-value" id="modal-trigger"></div>
      </div>

      <!-- 탐지 키워드 -->
      <div class="modal-section" id="modal-kw-section">
        <div class="modal-label">🔍 탐지 키워드</div>
        <div class="kw-tags" id="modal-kw-tags"></div>
      </div>

      <!-- 상세 내용 -->
      <div class="modal-section">
        <div class="modal-label">📄 상세 내용</div>
        <div class="modal-detail-box" id="modal-detail"></div>
      </div>

      <!-- AI 권장조치 -->
      <div class="modal-section">
        <div class="modal-label">🤖 AI 권장조치</div>
        <div class="ai-actions-list" id="modal-ai-actions"></div>
      </div>

      <!-- 메타 정보 -->
      <div class="modal-section">
        <div class="modal-label">📋 케이스 정보</div>
        <div class="modal-meta-grid">
          <div class="modal-meta-card"><div class="lbl">고객명</div><div class="val" id="modal-customer"></div></div>

</div>

<script>
const LS = 'danger-alert-v3';
let currentFilter = 'all';

const ALERT_TYPES = {

const SAMPLE = [
  {id:'ALT-001',severity:'critical',score:94,type:'legal',status:'active',customer:'김대호',orderId:'ORD-23500',

   tags:['legal','billing'],ts:Date.now()-86400000},
  {id:'ALT-002',severity:'critical',score:88,type:'billing',status:'assigned',customer:'박민국',orderId:'ORD-24100',

   detail:'결제 로그 분석 결과 ORD-24100에 대해 15:23, 15:24, 15:25 총 3회 결제 처리됨.\n\n합계: ₩127,500 × 3 = ₩382,500 오청구\n\n결제 PG사: KG이니시스 / 카드사 환불 요청 필요',

   aiActions:['PG사(KG이니시스)에 중복 결제 취소 요청','2회분(₩255,000) 즉시 환불 처리','고객에게 환불 완료 SMS 발송','결제 시스템 오류 재발 방지 티켓 등록'],
   tags:['billing'],ts:Date.now()-3600000*3},
  {id:'ALT-003',severity:'high',score:76,type:'media',status:'active',customer:'이수진',orderId:'ORD-23980',
   trigger:'SNS 확산 위협 — 인스타그램 게시 예고',
   detail:'고객 메시지: "답장도 없고 처리도 안 되네요. 제 팔로워 5만명한테 이 상황 공유할게요. 기다리고 있을게요."\n\n탐지: SNS/팔로워/공유 키워드 감지 / 팔로워 5만명 → 고위험',
   keywords:['팔로워 5만','SNS 공유','인스타그램','답장 없음'],
   aiActions:['30분 이내 담당자 직접 연락 필수','불편 사항 공감 + 즉시 해결 약속 제시','교환/환불 중 고객 선택 옵션 제공','SNS 모니터링 태그 등록 (계정 추적)'],
   tags:['media'],ts:Date.now()-3600000*2},
  {id:'ALT-004',severity:'high',score:71,type:'repeat',status:'active',customer:'최상원',orderId:'ORD-23701',
   trigger:'동일 고객 3회 이상 반복 불만 접수',
   detail:'접수 이력:\n- 2026-05-20: 배송 지연 불만\n- 2026-05-22: 재접수 — 답변 불만족\n- 2026-05-25: 3차 접수 — 환불 요청 추가\n\n탐지: 동일 고객 3회↑ 반복 패턴 + 감정 점수 상승 추세',
   keywords:['3차 접수','환불 요청','답변 불만족','배송 지연'],
   aiActions:['전담 담당자 1:1 배정 (응대 일관성 확보)','환불 또는 재배송 중 고객 의사 확인','이전 3건 응대 이력 검토 후 사과 연락','VIP 고객 여부 확인 및 추가 혜택 검토'],
   tags:['repeat'],ts:Date.now()-1800000},
  {id:'ALT-005',severity:'medium',score:35,type:'escalation',status:'resolved',customer:'정현아',orderId:'ORD-23650',
   trigger:'담당자 에스컬레이션 요청 — 해결 완료',
   detail:'오배송 건 직접 배상 합의 완료. 고객 만족 확인.\n\n처리: 환불 ₩89,000 + 사과 기프트콘 ₩10,000 지급\n해결 시간: 2시간 14분',
   keywords:['오배송','합의 완료','기프트콘'],
   aiActions:['케이스 종료 처리 완료','재발 방지: 물류팀 오배송 알림 전달','고객 만족도 설문 발송 (24시간 후)'],
   tags:[],ts:Date.now()-86400000*2},
  {id:'ALT-006',severity:'high',score:82,type:'quality',status:'active',customer:'(다수)',orderId:'—',
   trigger:'동일 상품 불량 신고 5건 집중 — SKU: HOOD-NAVY-L',
   detail:'최근 24시간 내 기모 후드 집업 네이비 L (SKU: HOOD-NAVY-L) 불량 신고 5건 접수.\n\n유형: 박음질 불량 3건, 지퍼 불량 2건\n\n권고: 해당 SKU 판매 중지 + 품질팀 긴급 검수 요청',
   keywords:['품질불량','박음질','지퍼불량','HOOD-NAVY-L','5건 집중'],
   aiActions:['HOOD-NAVY-L SKU 즉시 판매 중지 요청','품질팀에 긴급 검수 의뢰 (샘플 5개 회수)','신고 고객 5명 전원 교환 또는 전액 환불 처리','재고 창고 해당 로트 격리 요청'],
   tags:['quality'],ts:Date.now()-900000},
];

function loadData(){
  try{
    const s=localStorage.getItem(LS);
    if(!s) return SAMPLE.map(d=>({...d,keywords:[...(d.keywords||[])],tags:[...d.tags],aiActions:[...(d.aiActions||[])]}));
    const p=JSON.parse(s);
    return (Array.isArray(p)&&p.length)?p:SAMPLE.map(d=>({...d,keywords:[...(d.keywords||[])],tags:[...d.tags],aiActions:[...(d.aiActions||[])]}));
  }catch(e){ return SAMPLE.map(d=>({...d,keywords:[...(d.keywords||[])],tags:[...d.tags],aiActions:[...(d.aiActions||[])]})); }
}
function saveData(d){ localStorage.setItem(LS,JSON.stringify(d)); }
function timeDiff(ts){ const m=Math.floor((Date.now()-ts)/60000); if(m<1)return '방금'; if(m<60)return m+'분 전'; const h=Math.floor(m/60); if(h<24)return h+'시간 전'; return Math.floor(h/24)+'일 전'; }
function esc(t){ const d=document.createElement('div'); d.textContent=t||''; return d.innerHTML; }

function scoreColor(s){ if(s>=80) return 'var(--c-danger)'; if(s>=60) return 'var(--c-warn)'; return 'var(--c-accent)'; }
function scoreLabel(s){ if(s>=80) return '위험'; if(s>=60) return '주의'; return '안전'; }

function makeSvgRing(score,size,color){
  const r=size===64?24:32;
  const circ=2*Math.PI*r;
  const offset=circ-(score/100)*circ;
  return `<svg class="acard-score-ring" viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">
    <circle class="ring-bg" cx="${size/2}" cy="${size/2}" r="${r}"/>
    <circle class="ring-fg" cx="${size/2}" cy="${size/2}" r="${r}" stroke="${color}" stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"/>
    <text class="ring-label" x="${size/2}" y="${size/2+1}" style="fill:${color};font-size:${size===64?11:14}px">${score}</text>
  </svg>`;
}

function setFilter(f,el){
  currentFilter=f;
  document.querySelectorAll('.f-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  renderAll();
}

function renderAll(){
  const data=loadData();
  const q=(document.getElementById('search-input').value||'').toLowerCase();
  const counts={all:data.length,active:0,assigned:0,resolved:0};
  data.forEach(d=>{ counts[d.status]=(counts[d.status]||0)+1; });
  document.getElementById('st-active').textContent=counts.active||0;
  document.getElementById('st-assigned').textContent=counts.assigned||0;
  document.getElementById('st-resolved').textContent=counts.resolved||0;
  ['all','active','assigned','resolved'].forEach(k=>{ const el=document.getElementById('cnt-'+k); if(el) el.textContent=counts[k]||0; });

  let filtered=data;
  if(currentFilter!=='all') filtered=filtered.filter(d=>d.status===currentFilter);
  if(q) filtered=filtered.filter(d=>(d.customer+d.orderId+d.trigger+(d.keywords||[]).join(' ')).toLowerCase().includes(q));
  filtered.sort((a,b)=>{const so={critical:0,high:1,medium:2}; return (so[a.severity]||2)-(so[b.severity]||2)||(b.ts-a.ts);});

  const el=document.getElementById('alert-list');
  if(!filtered.length){ el.innerHTML='<div style="text-align:center;padding:60px;color:var(--c-text-4);font-size:12px">해당 케이스가 없습니다.</div>'; return; }

  el.innerHTML=filtered.map(d=>{
    const sc=d.score||50;
    const col=scoreColor(sc);
    const kwHtml=(d.keywords||[]).slice(0,4).map(k=>`<span class="kw-tag">${esc(k)}</span>`).join('');
    return `
    <div class="acard sev-${d.severity} ${d.status==='resolved'?'resolved':''}" onclick="openDetail('${esc(d.id)}')">
      <div class="acard-head">
        <span class="sev-badge sev-${d.severity}">${{critical:'🔴 긴급',high:'🟠 높음',medium:'🟡 중간'}[d.severity]||d.severity}</span>
        <span class="alert-type-badge">${TYPE_ICON[d.type]||''} ${ALERT_TYPES[d.type]||d.type}</span>
        <span class="a-id">${esc(d.id)}</span>
        <span class="a-time">${timeDiff(d.ts)}</span>
        <span class="a-status ${{active:'s-active',assigned:'s-assigned',resolved:'s-resolved'}[d.status]||'s-active'}">${{active:'활성',assigned:'담당배정',resolved:'해결'}[d.status]||d.status}</span>
      </div>
      <div class="acard-body">
        <div class="score-ring-wrap">
          ${makeSvgRing(sc,64,col)}
          <div class="ring-sub" style="color:${col}">${scoreLabel(sc)}</div>
        </div>
        <div class="acard-content">
          <div class="a-trigger"><span class="icon">⚡</span><span>${esc(d.trigger)}</span></div>
          ${kwHtml?`<div class="keyword-section"><div class="keyword-lbl">탐지 키워드</div><div class="kw-tags">${kwHtml}</div></div>`:''}
          <div class="a-meta-row">
            <div class="a-meta-item"><span class="lbl">고객</span><span class="val">${esc(d.customer)}</span></div>
            <div class="a-meta-item"><span class="lbl">주문</span><span class="val">${esc(d.orderId)}</span></div>
          </div>
        </div>
      </div>
      <div class="acard-foot" onclick="event.stopPropagation()">
        <span class="foot-hint">🖱 클릭하여 AI 권장조치 보기</span>
        <div class="action-btns">
          ${d.status==='resolved'
            ? `<span class="resolved-lbl">✓ 해결 완료</span>`
            : `${d.status==='active'?`<button class="btn-assign" onclick="assignAlert('${esc(d.id)}')">담당 배정</button>`:''}
               <button class="btn-escalate" onclick="escalateAlert('${esc(d.id)}')">에스컬레이션</button>
               <button class="btn-resolve" onclick="resolveAlert('${esc(d.id)}')">해결 처리</button>`
          }
        </div>
      </div>
    </div>`;
  }).join('');

  // Timeline
  const tl=document.getElementById('tl-list');
  const sorted=[...data].sort((a,b)=>b.ts-a.ts).slice(0,15);
  tl.innerHTML=sorted.map(d=>`
    <div class="tl-item" onclick="openDetail('${esc(d.id)}')">
      <div class="tl-dot" style="background:${scoreColor(d.score||50)}"></div>
      <div class="tl-body">
        <div class="t">${esc(d.id)} ${TYPE_ICON[d.type]||''} ${esc(d.customer)}</div>
        <div class="m">${timeDiff(d.ts)} · ${{active:'활성',assigned:'배정',resolved:'해결'}[d.status]||d.status} · ${d.score||'?'}점</div>
      </div>
    </div>
  `).join('');
}

function openDetail(id){
  const data=loadData(); const d=data.find(x=>x.id===id); if(!d) return;
  const sc=d.score||50; const col=scoreColor(sc);

  // 헤더
  const badge=document.getElementById('modal-sev-badge');
  badge.className='sev-badge sev-'+d.severity;
  badge.textContent={critical:'🔴 긴급',high:'🟠 높음',medium:'🟡 중간'}[d.severity]||d.severity;
  document.getElementById('modal-id').textContent=d.id;
  document.getElementById('modal-title').textContent=ALERT_TYPES[d.type]||d.type;

  // 점수 링 배너
  const circ=201.1; const offset=circ-(sc/100)*circ;
  const fg=document.getElementById('modal-ring-fg');
  fg.style.stroke=col; fg.setAttribute('stroke-dashoffset',offset.toFixed(1));
  document.getElementById('modal-ring-text').textContent=sc;
  document.getElementById('modal-ring-text').style.fill=col;
  document.getElementById('modal-score-num').innerHTML=`<span style="color:${col}">${sc}</span><span style="font-size:14px;color:var(--c-text-3)">/100</span>`;
  document.getElementById('modal-score-desc').textContent=scoreLabel(sc)+' — '+{critical:'즉각 조치 필요',high:'신속 처리 권고',medium:'모니터링 유지'}[d.severity];
  document.getElementById('modal-score-bar-fill').style.cssText=`width:${sc}%;background:${col}`;
  const statusBadge=document.getElementById('modal-status-badge');
  statusBadge.className='a-status '+({active:'s-active',assigned:'s-assigned',resolved:'s-resolved'}[d.status]||'s-active');
  statusBadge.textContent={active:'🔴 활성',assigned:'🟠 담당배정',resolved:'✅ 해결'}[d.status]||d.status;

  // 트리거
  document.getElementById('modal-trigger').textContent=d.trigger;

  // 키워드
  const kwSec=document.getElementById('modal-kw-section');
  const kwTags=document.getElementById('modal-kw-tags');
  if(d.keywords&&d.keywords.length){
    kwTags.innerHTML=d.keywords.map(k=>`<span class="kw-tag">${esc(k)}</span>`).join('');
    kwSec.style.display='';
  } else { kwSec.style.display='none'; }

  // 상세 내용
  document.getElementById('modal-detail').textContent=d.detail;

  // AI 권장조치
  const aiList=document.getElementById('modal-ai-actions');
  if(d.aiActions&&d.aiActions.length){
    aiList.innerHTML=d.aiActions.map((a,i)=>`
      <div class="ai-action-item">
        <div class="ai-action-num">${i+1}</div>
        <div class="ai-action-text">${esc(a)}</div>
      </div>`).join('');
  } else { aiList.innerHTML='<div style="color:var(--c-text-4);font-size:12px">권장조치 정보 없음</div>'; }

  // 메타
  document.getElementById('modal-customer').textContent=d.customer;
  document.getElementById('modal-order').textContent=d.orderId;
  document.getElementById('modal-time').textContent=timeDiff(d.ts);
  document.getElementById('modal-severity').textContent={critical:'긴급',high:'높음',medium:'중간'}[d.severity]||d.severity;
  document.getElementById('modal-type-val').textContent=(TYPE_ICON[d.type]||'')+' '+(ALERT_TYPES[d.type]||d.type);
  document.getElementById('modal-score-meta').textContent=sc+'점 / '+scoreLabel(sc);

  // 후속조치 버튼
  const fbSec=document.getElementById('modal-followup-section');
  const fbBtns=document.getElementById('modal-followup-btns');
  if(d.status==='resolved'){
    fbSec.style.display='none';
  } else {
    fbSec.style.display='';
    const assign=d.status==='active'?`<button class="btn-followup warn" onclick="assignAlert('${esc(d.id)}');closeDetail()">👤 담당자 배정</button>`:'';
    fbBtns.innerHTML=`
      ${assign}
      <button class="btn-followup purple" onclick="escalateAlert('${esc(d.id)}')">🆘 에스컬레이션</button>
      <button class="btn-followup ghost" onclick="contactAlert('${esc(d.id)}')">📞 고객 연락 메모</button>
      <button class="btn-followup ghost" onclick="reportAlert('${esc(d.id)}')">📋 관리자 보고</button>
      <button class="btn-followup success" onclick="resolveAlert('${esc(d.id)}');closeDetail()">✅ 해결 처리</button>`;
  }

  document.getElementById('detail-modal').classList.remove('hidden');
  document.addEventListener('keydown',escClose);
}

function closeDetail(e){
  if(e&&e.target!==document.getElementById('detail-modal')) return;
  document.getElementById('detail-modal').classList.add('hidden');
  document.removeEventListener('keydown',escClose);
}
function escClose(e){ if(e.key==='Escape'){ document.getElementById('detail-modal').classList.add('hidden'); document.removeEventListener('keydown',escClose); } }

function assignAlert(id){
  const data=loadData(); const d=data.find(x=>x.id===id); if(!d||d.status==='resolved') return;
  d.status='assigned'; saveData(data); renderAll(); showToast(`${id} 담당자 배정 완료`,'warn');
}
function escalateAlert(id){
  showToast(`${id} 에스컬레이션 전송 완료`,'warn');
}
function resolveAlert(id){
  const data=loadData(); const d=data.find(x=>x.id===id); if(!d) return;
  d.status='resolved'; saveData(data); renderAll(); showToast(`${id} 해결 처리 완료`,'ok');
}
function contactAlert(id){ showToast(`${id} 고객 연락 메모 저장`,'ok'); }
function reportAlert(id){ showToast(`${id} 관리자 보고 전송`,'warn'); }

let mockCount=7;
function addMockAlert(){
  const data=loadData();
  const sevs=['critical','high','medium'];
  const types=Object.keys(ALERT_TYPES);
  const sev=sevs[Math.floor(Math.random()*sevs.length)];
  const type=types[Math.floor(Math.random()*types.length)];
  const sc={critical:Math.floor(Math.random()*20)+78,high:Math.floor(Math.random()*20)+55,medium:Math.floor(Math.random()*30)+25}[sev];
  data.unshift({id:`ALT-${String(mockCount++).padStart(3,'0')}`,severity:sev,score:sc,type,status:'active',
    customer:'테스트고객',orderId:`ORD-${Math.floor(Math.random()*99999)}`,
    trigger:`[테스트] ${ALERT_TYPES[type]} 탐지`,
    detail:'자동 생성된 테스트 알림입니다.',
    keywords:['테스트','자동생성'],
    aiActions:['테스트 케이스 확인 후 종료 처리'],
    tags:[]});
  saveData(data); renderAll(); showToast('테스트 알림 추가됨','warn');
}

function toggleTheme(){ const r=document.documentElement; r.dataset.theme=r.dataset.theme==='dark'?'':'dark'; }
function showToast(msg,type){
  const c=document.getElementById('toast-stack');
  const colors={ok:'#059669',warn:'#f59e0b',err:'#dc2626'};
  const t=document.createElement('div'); t.textContent=msg;
  t.style.cssText=`padding:9px 14px;border-radius:8px;font-size:12px;font-weight:600;color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.2);max-width:300px;pointer-events:auto;background:${colors[type]||colors.ok}`;
  c.appendChild(t); setTimeout(()=>{ t.style.transition='opacity .3s'; t.style.opacity='0'; setTimeout(()=>t.remove(),300); },2500);
}

renderAll();
</script>
</body>
</html>
